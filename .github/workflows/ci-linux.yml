name: Ubuntu CI
on:
  pull_request:
  push:
  schedule:
    - cron: '0 0 * * 0'
jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ubuntu ci]')"
    runs-on: ubuntu-22.04
    env:
      CXX: ${{ matrix.compiler }}
      INSPIRCD_DEBUG: 3
      INSPIRCD_VERBOSE: 1
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update --assume-yes
          sudo apt-get install --assume-yes --no-install-recommends \
            clang \
            g++ \
            git \
            libargon2-dev \
            libgnutls28-dev \
            libldap2-dev \
            libmaxminddb-dev \
            libmysqlclient-dev \
            libpcre2-dev \
            libpq-dev \
            libpsl-dev \
            libre2-dev \
            libsqlite3-dev \
            libssl-dev \
            libtre-dev \
            make \
            pkg-config

      - name: Enable extra modules
        run: |-
          ./modulemanager extra enable geo_maxmind hash_argon2 hash_gnutls ldap log_syslog mysql pgsql regex_pcre2 regex_posix regex_re2 regex_tre rehashsignal sqlite3 ssl_gnutls ssl_openssl

      - name: Run configure
        run: |-
          ./configure --development --disable-auto-extras --socketengine ${{ matrix.socketengine }}

      - name: Build and install
        run: |-
          make --jobs $(($(getconf _NPROCESSORS_ONLN) + 1)) install

      - name: Run
        run: |-
          touch ./run/conf/inspircd.conf
          ./run/inspircd start

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - clang++
          - g++
        socketengine:
          - epoll
          - poll
          - select
